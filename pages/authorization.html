<!DOCTYPE html>
<html lang="ru">
  <head>
    @@include('partials/head.html')
    <title>
      AxoShop — Магазин цифровых товаров | Донат в игры, Пополнение Steam
    </title>
  </head>
  <body>
    <div class="content-area">
      @@include('partials/nav.html')

      <main>
        <div class="auth-card">
          <div class="auth-header">
            <h1 class="auth-title">авторизация</h1>
            <p class="auth-subtitle">пожалуйста введите свои данные</p>
          </div>

          <form class="auth-form">
            <div class="auth-input-group">
              <label for="auth-email" class="auth-label">почта</label>
              <input
                type="email"
                id="auth-email"
                class="auth-input"
                placeholder="example@mail.com"
                required
              />
            </div>

            <div class="auth-input-group">
              <div class="auth-label-row">
                <label for="auth-password" class="auth-label">пароль</label>
                <button
                  type="button"
                  class="auth-password-toggle"
                  aria-label="Показать пароль"
                >
                  <svg
                    width="23" height="22" viewBox="0 0 23 22" fill="none" xmlns="http://www.w3.org/2000/svg"
                  >
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M20.4122 0.280684C20.7865 -0.0935045 21.3933 -0.0936182 21.7676 0.280684C22.1418 0.654996 22.1418 1.26179 21.7676 1.63615L2.59477 20.809C2.22039 21.1829 1.61354 21.1832 1.2393 20.809C0.864942 20.4347 0.864942 19.8269 1.2393 19.4526L4.70805 15.9838C3.19424 14.9273 1.75408 13.4987 0.39067 11.7045C-0.130158 11.0188 -0.130288 10.0696 0.39067 9.3842C3.66432 5.07633 7.37889 2.87552 11.5 2.87541C13.2759 2.87541 14.9767 3.28446 16.5987 4.09416L20.4122 0.280684ZM19.6827 6.19084C20.6938 7.0778 21.6701 8.14122 22.6094 9.37736C23.1301 10.0629 23.1301 11.0113 22.6094 11.6967C19.3357 16.0047 15.6214 18.2054 11.5 18.2055C10.3595 18.2055 9.24948 18.0378 8.17192 17.7026L10.6241 15.2504C10.9077 15.3027 11.2003 15.3305 11.4991 15.3305C14.146 15.3303 16.292 13.1836 16.292 10.5365C16.292 10.238 16.2642 9.94594 16.212 9.66252L19.6827 6.19084ZM11.4991 5.75139C8.85217 5.75156 6.70628 7.89747 6.7061 10.5444C6.7061 11.5223 6.99913 12.4326 7.502 13.1908L8.90532 11.7875C8.72481 11.4115 8.62309 10.9894 8.62309 10.5444C8.62327 8.95629 9.911 7.66856 11.4991 7.66838C11.9429 7.66838 12.3639 7.76904 12.7393 7.94865C12.7214 7.96653 12.704 7.98605 12.6875 8.00529L14.1456 6.54729C13.3873 6.04443 12.477 5.75139 11.4991 5.75139Z" fill="#C5C5C5"/>
                  </svg>
                </button>
              </div>
              <input
                type="password"
                id="auth-password"
                class="auth-input"
                placeholder="12345678"
                required
                minlength="8"
              />
            </div>

            <div class="auth-error-message"></div>

            <div class="auth-actions">
              <a href="/pages/register.html" class="btn btn--outline">
                зарегистрироваться
              </a>
              <button type="submit" class="btn btn--black">
                войти
              </button>
            </div>
          </form>

          <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">быстрый вход</span>
            <div class="auth-divider-line"></div>
          </div>

          <div class="auth-socials">
            <div class="auth-socials-row" style="display: none;">
              <button
                type="button"
                class="btn btn--black auth-social-btn-small"
              >
                <img src="/assets/img/google-au.png" alt="Google" />
              <span>Google</span>
            </button>

              <button
                type="button"
                class="btn btn--black auth-social-btn-small"
              >
                <img src="/assets/img/vk-au.png" alt="VK" />
                <span>вконтакте</span>
              </button>
            </div>

              <button
                type="button"
                class="btn btn--black btn--full auth-social-btn"
              >
                <img src="/assets/img/tg-au.png" alt="Telegram" />
                <span>телеграм</span>
              </button>
          </div>
        </div>
      </main>
      
    </div>

    @@include('partials/footer.html')

    <script src="/js/updateNav.js"></script>
    <script src="/js/authorization.js"></script>
  </body>
</html>
